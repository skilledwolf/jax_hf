name: build-and-test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORM_NAME: cpu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest -q

      - name: Build sdist and wheel
        run: |
          python -m build -s -w

      - name: Smoke-check built wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install -U pip
          python -m pip install dist/*.whl
          python - << 'PY'
          import jax_hf
          import importlib.metadata as md
          print("jax_hf version:", md.version("jax_hf"))
          # Smoke-check public API surface that downstream users rely on.
          for name in ("HartreeFockKernel", "solve", "solve_scf",
                       "SolverConfig", "SCFConfig", "build_fock",
                       "hf_energy", "resample_kgrid"):
              assert hasattr(jax_hf, name), f"missing public symbol: {name}"
          print("public API OK:", sorted(jax_hf.__all__))
          PY
