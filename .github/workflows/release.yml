name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORM_NAME: cpu
    # 👇 This must match exactly the environment you configure on PyPI
    environment: jax_hf_env
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest -q

      - name: Build sdist and wheel
        run: |
          python -m build -s -w

      - name: Smoke-check built wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install -U pip
          python -m pip install dist/*.whl
          python - << 'PY'
          import jax_hf
          import importlib.metadata as md
          print("jax_hf version:", md.version("jax_hf"))
          print("default solver:", jax_hf.DEFAULT_SOLVER)
          PY

      # Only publish on tag refs like v0.1.0
      - name: Publish to PyPI via OIDC (Trusted Publisher)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
